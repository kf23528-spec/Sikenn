<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POLO.fbx 読み込みテスト</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f2f2f2;
      font-family: sans-serif;
    }
    canvas {
      display: block;
    }
    #log {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 10;
      width: min(520px, calc(100vw - 24px));
      max-height: 45vh;
      overflow: auto;
      background: rgba(255,255,255,0.88);
      color: #111;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.45;
      white-space: pre-wrap;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }
  </style>
</head>
<body>
  <div id="log">初期化中...</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/examples/js/loaders/FBXLoader.js"></script>

  <script>
    const logBox = document.getElementById("log");
    const logs = [];
    function log(...args) {
      console.log(...args);
      const text = args.map(v => {
        if (typeof v === "string") return v;
        try { return JSON.stringify(v, null, 2); } catch (e) { return String(v); }
      }).join(" ");
      logs.push(text);
      logBox.textContent = logs.slice(-30).join("\n");
    }

    if (!window.THREE) {
      log("Three.js の読み込みに失敗しました。");
      throw new Error("THREE is not loaded");
    }

    log("Three.js 読み込みOK");
    log("FBXLoader 読み込みOK");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf7f7f7);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      2000
    );
    camera.position.set(4, 3, 6);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio || 1);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1, 0);

    // ライト
    scene.add(new THREE.AmbientLight(0xffffff, 1.5));

    const dir = new THREE.DirectionalLight(0xffffff, 1.3);
    dir.position.set(6, 10, 7);
    scene.add(dir);

    const hemi = new THREE.HemisphereLight(0xffffff, 0xe8e8e8, 0.8);
    scene.add(hemi);

    // 空間
    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(40, 40),
      new THREE.MeshStandardMaterial({ color: 0xededed, roughness: 1 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    const wallMat = new THREE.MeshStandardMaterial({ color: 0xfdfdfd, roughness: 1 });

    const backWall = new THREE.Mesh(new THREE.PlaneGeometry(40, 15), wallMat);
    backWall.position.set(0, 7.5, -20);
    scene.add(backWall);

    const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(40, 15), wallMat);
    leftWall.position.set(-20, 7.5, 0);
    leftWall.rotation.y = Math.PI / 2;
    scene.add(leftWall);

    const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(40, 15), wallMat);
    rightWall.position.set(20, 7.5, 0);
    rightWall.rotation.y = -Math.PI / 2;
    scene.add(rightWall);

    const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), wallMat);
    ceiling.position.y = 15;
    ceiling.rotation.x = Math.PI / 2;
    scene.add(ceiling);

    const grid = new THREE.GridHelper(40, 40, 0xdddddd, 0xe9e9e9);
    grid.position.y = 0.001;
    scene.add(grid);

    let model = null;

    log("POLO.fbx の読み込み開始...");
    const loader = new THREE.FBXLoader();

    loader.load(
      "POLO.fbx",
      (object) => {
        log("POLO.fbx 読み込み成功");
        log("子要素数:", object.children.length);

        model = object;

        // マテリアル・影設定
        let meshCount = 0;
        object.traverse((child) => {
          if (child.isMesh) {
            meshCount++;
            child.castShadow = true;
            child.receiveShadow = true;
            if (child.material) {
              child.material.flatShading = false;
            }
          }
        });
        log("Mesh数:", meshCount);

        // バウンディングボックスで中央寄せ＆スケール調整
        const box = new THREE.Box3().setFromObject(object);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());

        log("元サイズ:", `x=${size.x.toFixed(3)} y=${size.y.toFixed(3)} z=${size.z.toFixed(3)}`);
        log("中心座標:", `x=${center.x.toFixed(3)} y=${center.y.toFixed(3)} z=${center.z.toFixed(3)}`);

        // 中心を原点へ
        object.position.sub(center);

        // 大きさを見やすく調整
        const maxDim = Math.max(size.x, size.y, size.z);
        const targetSize = 3.0;
        const scale = maxDim > 0 ? (targetSize / maxDim) : 1;
        object.scale.setScalar(scale);

        // 床に接地するように調整
        const box2 = new THREE.Box3().setFromObject(object);
        const minY = box2.min.y;
        object.position.y -= minY;

        scene.add(object);

        // カメラの見え方調整
        controls.target.set(0, 1, 0);
        camera.position.set(5, 3, 7);
        camera.lookAt(0, 1, 0);

        log("スケール:", scale.toFixed(4));
        log("配置完了");
      },
      (xhr) => {
        if (xhr && xhr.total) {
          const p = ((xhr.loaded / xhr.total) * 100).toFixed(1);
          log(`読み込み中... ${p}%`);
        } else {
          log(`読み込み中... ${xhr.loaded} bytes`);
        }
      },
      (error) => {
        console.error(error);
        log("読み込み失敗");
        log(String(error));
      }
    );

    function animate() {
      requestAnimationFrame(animate);
      controls.update();

      if (model) {
        model.rotation.y += 0.005;
      }

      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
