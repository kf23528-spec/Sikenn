<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>白い試験場のPOLO.fbx</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f2f2f2;
    }
    canvas { display: block; }
    #log {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 10;
      font-family: monospace;
      font-size: 13px;
      line-height: 1.45;
      color: #222;
      background: rgba(255,255,255,0.88);
      padding: 10px 12px;
      border-radius: 8px;
      white-space: pre-wrap;
      max-width: min(92vw, 520px);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="log">準備中...</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/examples/js/loaders/FBXLoader.js"></script>

  <script>
    const logBox = document.getElementById("log");
    function log(msg) {
      console.log(msg);
      logBox.textContent += "\n" + msg;
    }

    if (!window.THREE) {
      logBox.textContent = "Three.js の読み込みに失敗しました。";
      throw new Error("THREE is not loaded");
    }

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf7f7f7);
    scene.fog = new THREE.Fog(0xf7f7f7, 18, 60);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(4, 3, 6);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio || 1);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const ambient = new THREE.AmbientLight(0xffffff, 1.5);
    scene.add(ambient);

    const hemi = new THREE.HemisphereLight(0xffffff, 0xe5e5e5, 0.8);
    scene.add(hemi);

    const dir = new THREE.DirectionalLight(0xffffff, 1.2);
    dir.position.set(5, 10, 7);
    dir.castShadow = true;
    scene.add(dir);

    // 床
    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(40, 40),
      new THREE.MeshStandardMaterial({ color: 0xededed, roughness: 1 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // 壁
    const wallMat = new THREE.MeshStandardMaterial({ color: 0xfdfdfd, roughness: 1 });

    const backWall = new THREE.Mesh(new THREE.PlaneGeometry(40, 15), wallMat);
    backWall.position.set(0, 7.5, -20);
    scene.add(backWall);

    const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(40, 15), wallMat);
    leftWall.position.set(-20, 7.5, 0);
    leftWall.rotation.y = Math.PI / 2;
    scene.add(leftWall);

    const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(40, 15), wallMat);
    rightWall.position.set(20, 7.5, 0);
    rightWall.rotation.y = -Math.PI / 2;
    scene.add(rightWall);

    const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), wallMat);
    ceiling.rotation.x = Math.PI / 2;
    ceiling.position.y = 15;
    scene.add(ceiling);

    // 見やすさ用の薄いグリッド
    const grid = new THREE.GridHelper(40, 40, 0xdddddd, 0xe9e9e9);
    grid.position.y = 0.001;
    scene.add(grid);

    let model = null;

    log("FBX読み込み開始: POLO.fbx");

    const loader = new THREE.FBXLoader();
    loader.load(
      "POLO.fbx",
      (object) => {
        log("FBX読み込み成功");

        model = object;
        scene.add(model);

        model.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;

            if (Array.isArray(child.material)) {
              child.material.forEach(m => {
                if (m) m.needsUpdate = true;
              });
            } else if (child.material) {
              child.material.needsUpdate = true;
            }
          }
        });

        // 中心位置とサイズを自動調整
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());

        log(`元サイズ: x=${size.x.toFixed(3)}, y=${size.y.toFixed(3)}, z=${size.z.toFixed(3)}`);
        log(`中心座標: x=${center.x.toFixed(3)}, y=${center.y.toFixed(3)}, z=${center.z.toFixed(3)}`);

        model.position.sub(center);

        const maxDim = Math.max(size.x, size.y, size.z);
        const targetSize = 2.5;
        const scale = maxDim > 0 ? targetSize / maxDim : 1;
        model.scale.setScalar(scale);

        // 床の上に乗るように少し持ち上げる
        const box2 = new THREE.Box3().setFromObject(model);
        const minY = box2.min.y;
        model.position.y -= minY;

        log(`スケール: ${scale.toFixed(4)}`);
        log("配置調整完了");
        log("回転アニメーション開始");

        camera.position.set(4, 3, 6);
        camera.lookAt(0, 1, 0);
      },
      (xhr) => {
        if (xhr.total) {
          const percent = Math.floor((xhr.loaded / xhr.total) * 100);
          logBox.textContent = `読み込み中... ${percent}%`;
        } else {
          logBox.textContent = `読み込み中... ${Math.floor(xhr.loaded / 1024)} KB`;
        }
      },
      (error) => {
        console.error(error);
        log("読み込み失敗");
        log(String(error));
        log("・POLO.fbx が同じフォルダにあるか確認");
        log("・ファイル名の大文字小文字を確認");
        log("・ブラウザのコンソールも確認");
      }
    );

    function animate() {
      requestAnimationFrame(animate);

      if (model) {
        model.rotation.y += 0.01;
      }

      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
