<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Three.js FBX Animation Test</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f2f2f2;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    #loading {
      position: absolute;
      left: 16px;
      top: 16px;
      z-index: 10;
      padding: 10px 14px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.88);
      color: #222;
      font-size: 14px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
      user-select: none;
    }

    #errorBox {
      display: none;
      position: absolute;
      left: 16px;
      top: 58px;
      z-index: 10;
      padding: 10px 14px;
      border-radius: 10px;
      background: rgba(255, 235, 235, 0.96);
      color: #a10000;
      font-size: 14px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
      max-width: min(520px, calc(100vw - 32px));
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="loading">polo.fbx を読み込み中…</div>
    <div id="errorBox"></div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { FBXLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/FBXLoader.js';

    let scene, camera, renderer;
    let mixer = null;
    let clock = new THREE.Clock();

    let fallbackBox = null;
    let modelRoot = null;

    const loadingEl = document.getElementById('loading');
    const errorEl = document.getElementById('errorBox');

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0xf3f3f3);
      scene.fog = new THREE.Fog(0xf3f3f3, 10, 45);

      camera = new THREE.PerspectiveCamera(
        50,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      camera.position.set(0, 1.6, 4.5);
      camera.lookAt(0, 1.0, 0);

      renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: false
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.shadowMap.enabled = true;
      document.getElementById('app').appendChild(renderer.domElement);

      const ambient = new THREE.AmbientLight(0xffffff, 1.5);
      scene.add(ambient);

      const dirLight = new THREE.DirectionalLight(0xffffff, 2.2);
      dirLight.position.set(4, 8, 5);
      dirLight.castShadow = true;
      scene.add(dirLight);

      const fillLight = new THREE.DirectionalLight(0xffffff, 0.8);
      fillLight.position.set(-4, 3, -3);
      scene.add(fillLight);

      const floorGeo = new THREE.PlaneGeometry(50, 50);
      const floorMat = new THREE.MeshStandardMaterial({
        color: 0xffffff,
        roughness: 1.0,
        metalness: 0.0
      });
      const floor = new THREE.Mesh(floorGeo, floorMat);
      floor.rotation.x = -Math.PI / 2;
      floor.receiveShadow = true;
      scene.add(floor);

      const grid = new THREE.GridHelper(50, 50, 0xdddddd, 0xeeeeee);
      grid.position.y = 0.001;
      scene.add(grid);

      createFallbackBox();

      const loader = new FBXLoader();
      loader.load(
        'polo.fbx',
        (object) => {
          loadingEl.textContent = '読み込み完了';
          setTimeout(() => {
            loadingEl.style.display = 'none';
          }, 600);

          if (fallbackBox) {
            scene.remove(fallbackBox);
            fallbackBox.geometry.dispose();
            fallbackBox.material.dispose();
            fallbackBox = null;
          }

          modelRoot = object;
          object.traverse((child) => {
            if (child.isMesh) {
              child.castShadow = true;
              child.receiveShadow = true;
              if (child.material) {
                if (Array.isArray(child.material)) {
                  child.material.forEach((m) => {
                    if (m.map) m.map.colorSpace = THREE.SRGBColorSpace;
                  });
                } else if (child.material.map) {
                  child.material.map.colorSpace = THREE.SRGBColorSpace;
                }
              }
            }
          });

          // モデル全体を見やすいサイズに調整
          const box = new THREE.Box3().setFromObject(object);
          const size = new THREE.Vector3();
          const center = new THREE.Vector3();
          box.getSize(size);
          box.getCenter(center);

          const maxAxis = Math.max(size.x, size.y, size.z);
          const targetSize = 1.8;
          const scale = targetSize / (maxAxis || 1);

          object.scale.setScalar(scale);

          const boxAfterScale = new THREE.Box3().setFromObject(object);
          const centerAfterScale = new THREE.Vector3();
          boxAfterScale.getCenter(centerAfterScale);

          object.position.x += (object.position.x - centerAfterScale.x);
          object.position.z += (object.position.z - centerAfterScale.z);
          object.position.y -= boxAfterScale.min.y;

          scene.add(object);

          // FBX内にアニメーションがあれば、先頭の1本をループ再生
          if (object.animations && object.animations.length > 0) {
            mixer = new THREE.AnimationMixer(object);
            const clip = object.animations[0];
            const action = mixer.clipAction(clip);
            action.reset();
            action.setLoop(THREE.LoopRepeat, Infinity);
            action.clampWhenFinished = false;
            action.enabled = true;
            action.play();
          } else {
            mixer = null;
            console.warn('polo.fbx にはアニメーションが含まれていません。');
          }
        },
        (xhr) => {
          if (xhr.total > 0) {
            const percent = Math.floor((xhr.loaded / xhr.total) * 100);
            loadingEl.textContent = `polo.fbx を読み込み中… ${percent}%`;
          } else {
            loadingEl.textContent = 'polo.fbx を読み込み中…';
          }
        },
        (error) => {
          console.error('polo.fbx の読み込みに失敗しました:', error);

          loadingEl.style.display = 'none';
          errorEl.style.display = 'block';
          errorEl.textContent =
            'polo.fbx の読み込みに失敗しました。\\n' +
            '赤い箱を代わりに表示しています。\\n' +
            String(error && error.message ? error.message : error);

          if (fallbackBox) fallbackBox.visible = true;
        }
      );

      window.addEventListener('resize', onResize);
    }

    function createFallbackBox() {
      const geo = new THREE.BoxGeometry(1, 1, 1);
      const mat = new THREE.MeshStandardMaterial({
        color: 0xff0000,
        roughness: 0.6,
        metalness: 0.0
      });
      fallbackBox = new THREE.Mesh(geo, mat);
      fallbackBox.castShadow = true;
      fallbackBox.receiveShadow = true;
      fallbackBox.position.set(0, 0.5, 0);
      scene.add(fallbackBox);
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    }

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      if (mixer) {
        mixer.update(delta);
      }

      if (fallbackBox) {
        fallbackBox.rotation.y += 0.01;
        fallbackBox.rotation.x += 0.005;
      }

      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
