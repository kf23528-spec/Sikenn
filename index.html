<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>白い試験場の赤い箱</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f2f2f2;
    }
    #msg {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 10;
      font-family: sans-serif;
      font-size: 14px;
      color: #333;
      background: rgba(255,255,255,0.85);
      padding: 8px 10px;
      border-radius: 8px;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="msg">読み込み中...</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const msg = document.getElementById("msg");

    if (!window.THREE) {
      msg.textContent = "Three.js の読み込みに失敗しました。ネット接続かCDNを確認してください。";
      throw new Error("THREE is not loaded");
    }

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf7f7f7);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(4, 3, 6);
    camera.lookAt(0, 1, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio || 1);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // 光
    const ambient = new THREE.AmbientLight(0xffffff, 1.5);
    scene.add(ambient);

    const dir = new THREE.DirectionalLight(0xffffff, 1.2);
    dir.position.set(5, 10, 7);
    dir.castShadow = true;
    scene.add(dir);

    const hemi = new THREE.HemisphereLight(0xffffff, 0xe6e6e6, 0.8);
    scene.add(hemi);

    // 床
    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(40, 40),
      new THREE.MeshStandardMaterial({ color: 0xededed, roughness: 1 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // 壁（うっすら見えるように少しだけ色を変える）
    const wallMat = new THREE.MeshStandardMaterial({ color: 0xfdfdfd, roughness: 1 });

    const backWall = new THREE.Mesh(new THREE.PlaneGeometry(40, 15), wallMat);
    backWall.position.set(0, 7.5, -20);
    scene.add(backWall);

    const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(40, 15), wallMat);
    leftWall.position.set(-20, 7.5, 0);
    leftWall.rotation.y = Math.PI / 2;
    scene.add(leftWall);

    const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(40, 15), wallMat);
    rightWall.position.set(20, 7.5, 0);
    rightWall.rotation.y = -Math.PI / 2;
    scene.add(rightWall);

    const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), wallMat);
    ceiling.position.y = 15;
    ceiling.rotation.x = Math.PI / 2;
    scene.add(ceiling);

    // 赤い箱
    const box = new THREE.Mesh(
      new THREE.BoxGeometry(1.5, 1.5, 1.5),
      new THREE.MeshStandardMaterial({
        color: 0xff0000,
        roughness: 0.45,
        metalness: 0.08,
        emissive: 0x220000,
        emissiveIntensity: 0.25
      })
    );
    box.position.set(0, 0.75, 0);
    box.castShadow = true;
    scene.add(box);

    // 見え方確認用の薄い床ライン
    const grid = new THREE.GridHelper(40, 40, 0xdddddd, 0xe9e9e9);
    grid.position.y = 0.001;
    scene.add(grid);

    msg.textContent = "表示中";

    function animate() {
      requestAnimationFrame(animate);
      box.rotation.y += 0.01;
      box.rotation.x += 0.005;
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
