<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>polo.fbx Viewer</title>

  <!--
    ★ 修正ポイント①
    importmap で 'three' という裸のモジュール名を CDN URL に紐づける。
    FBXLoader / OrbitControls の内部 import も全てここで解決される。
  -->
  <script type="importmap">
  {
    "imports": {
      "three":                          "https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js",
      "three/examples/jsm/loaders/FBXLoader.js":    "https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/loaders/FBXLoader.js",
      "three/examples/jsm/controls/OrbitControls.js":"https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/controls/OrbitControls.js",
      "three/examples/jsm/libs/fflate.module.min.js":"https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/libs/fflate.module.min.js"
    }
  }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0f14;
      color: #c8cdd8;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      height: 100vh;
    }

    #canvas-container { position: fixed; inset: 0; }

    /* HUD */
    #hud {
      position: fixed;
      top: 16px;
      left: 20px;
      z-index: 10;
      pointer-events: none;
    }
    #hud h1 {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #4a7fa5;
      margin-bottom: 4px;
    }
    #anim-label { font-size: 13px; color: #7ec8a0; }

    /* ローディング／エラー オーバーレイ */
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      background: #0d0f14;
      transition: opacity 0.5s;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid #1e2530;
      border-top-color: #4a7fa5;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #status-text { font-size: 12px; letter-spacing: 0.15em; color: #6b7585; }

    /* エラー表示 */
    #error-box {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-align: center;
    }
    #error-box .error-icon  { font-size: 36px; line-height: 1; }
    #error-box .error-title { font-size: 14px; color: #c0504d; letter-spacing: 0.12em; }
    #error-box .error-msg   { font-size: 11px; color: #6b7585; max-width: 360px; line-height: 1.7; }
  </style>
</head>
<body>

<div id="canvas-container"></div>

<!-- HUD -->
<div id="hud">
  <h1>polo.fbx</h1>
  <div id="anim-label">— アニメーションなし —</div>
</div>

<!-- ローディング／エラー オーバーレイ -->
<div id="overlay">
  <div id="loading-box">
    <div class="spinner"></div>
    <div id="status-text">polo.fbx を読み込み中...</div>
  </div>
  <div id="error-box">
    <div class="error-icon">⚠</div>
    <div class="error-title">読み込みに失敗しました</div>
    <div class="error-msg" id="error-detail"></div>
  </div>
</div>

<!--
  ★ 修正ポイント②
  <script src> によるグローバル読み込みを廃止し、
  全て type="module" + importmap で統一する。
-->
<script type="module">
  import * as THREE from 'three';
  import { FBXLoader }     from 'three/examples/jsm/loaders/FBXLoader.js';
  import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';

  /* ─────────────────────────────────────────
      DOM refs
  ───────────────────────────────────────── */
  const overlay     = document.getElementById('overlay');
  const loadingBox  = document.getElementById('loading-box');
  const errorBox    = document.getElementById('error-box');
  const errorDetail = document.getElementById('error-detail');
  const statusText  = document.getElementById('status-text');
  const animLabel   = document.getElementById('anim-label');

  /* ─────────────────────────────────────────
      エラー表示ヘルパー（既存のエラー処理を維持）
  ───────────────────────────────────────── */
  function showError(message) {
    loadingBox.style.display = 'none';
    errorBox.style.display   = 'flex';
    errorDetail.textContent  = message;
    overlay.classList.remove('hidden');
  }

  /* ─────────────────────────────────────────
      Three.js セットアップ
  ───────────────────────────────────────── */
  const container = document.getElementById('canvas-container');

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
  renderer.outputEncoding    = THREE.sRGBEncoding;
  container.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0d0f14);
  scene.fog        = new THREE.Fog(0x0d0f14, 20, 80);

  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 500);
  camera.position.set(0, 2, 6);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 1, 0);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.update();

  const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xd0e8ff, 1.2);
  dirLight.position.set(5, 10, 7);
  dirLight.castShadow         = true;
  dirLight.shadow.mapSize.set(2048, 2048);
  dirLight.shadow.camera.near = 0.5;
  dirLight.shadow.camera.far  = 60;
  scene.add(dirLight);

  const fillLight = new THREE.PointLight(0x4a7fa5, 0.6, 30);
  fillLight.position.set(-4, 3, -4);
  scene.add(fillLight);

  const grid = new THREE.GridHelper(20, 40, 0x1e2530, 0x1e2530);
  scene.add(grid);

  /* ─────────────────────────────────────────
      AnimationMixer（アニメーション管理）
  ───────────────────────────────────────── */
  let mixer  = null;
  let action = null;
  const clock = new THREE.Clock();

  /* ─────────────────────────────────────────
      FBX 読み込み
  ───────────────────────────────────────── */
  const loader = new FBXLoader();

  loader.load(
    'polo.fbx',

    /* ── onLoad ── */
    (fbx) => {
      fbx.scale.setScalar(0.01);

      fbx.traverse((child) => {
        if (child.isMesh) {
          child.castShadow    = true;
          child.receiveShadow = true;
        }
      });

      scene.add(fbx);

      /* ── アニメーション設定 ───────────────────
          AnimationMixer を作成し、
          clips[0]（最初のアニメーション）をループ再生する
      ─────────────────────────────────────── */
      const clips = fbx.animations;

      if (clips && clips.length > 0) {
        mixer  = new THREE.AnimationMixer(fbx);
        action = mixer.clipAction(clips[0]);

        action.setLoop(THREE.LoopRepeat, Infinity);
        action.clampWhenFinished = false;
        action.play();

        animLabel.textContent = `▶ ${clips[0].name || 'clip_0'}`;
      } else {
        animLabel.textContent = '— アニメーションなし —';
      }

      // カメラをモデルに合わせて調整
      const box    = new THREE.Box3().setFromObject(fbx);
      const size   = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);

      controls.target.copy(center);
      camera.position.set(center.x, center.y + size.y * 0.5, center.z + maxDim * 2.5);
      controls.update();

      overlay.classList.add('hidden');
    },

    /* ── onProgress ── */
    (xhr) => {
      if (xhr.total > 0) {
        const pct = Math.round((xhr.loaded / xhr.total) * 100);
        statusText.textContent = `polo.fbx を読み込み中... ${pct}%`;
      }
    },

    /* ── onError（既存のエラー処理を維持） ── */
    (err) => {
      console.error('FBXLoader error:', err);
      showError(
        'polo.fbx の読み込みに失敗しました。\n\n' +
        'ファイルがこのHTMLと同じディレクトリに存在するか確認してください。\n' +
        'ローカルで開く場合は、ローカルサーバー経由でアクセスしてください。\n\n' +
        `詳細: ${err?.message ?? err}`
      );
    }
  );

  /* ─────────────────────────────────────────
      レンダーループ
  ───────────────────────────────────────── */
  function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();

    // AnimationMixer を毎フレーム更新（アニメーションの駆動）
    if (mixer) mixer.update(delta);

    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  /* ─────────────────────────────────────────
      リサイズ対応
  ───────────────────────────────────────── */
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
